name: release

on:
  push:
    branches: [main]
    paths-ignore:
      - "clients/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

# reusable-app-build이 GHCR push를 위해 packages:write를 요구 — org 기본이 read라 caller가
# 명시하지 않으면 권한 초과로 startup_failure가 된다(page 패턴과 동일).
permissions:
  contents: read
  packages: write

jobs:
  build:
    # homelab 공용 reusable 빌드(GHCR push). page/trip-mate 등과 동일 패턴.
    uses: ukyi-app/homelab/.github/workflows/reusable-app-build.yaml@main
    with:
      app: files
    # reusable의 흡수된 deploy-trigger가 빌드 후 bump-poll 디스패치용으로 쓴다(계약 형태 정합).
    # files는 시크릿 미프로비저닝이라 항상 clean skip(inert) — 현행 무변경, 크론/베스포크 bump 백스톱.
    secrets:
      HOMELAB_DISPATCH_APP_ID: ${{ secrets.HOMELAB_DISPATCH_APP_ID }}
      HOMELAB_DISPATCH_APP_PRIVATE_KEY: ${{ secrets.HOMELAB_DISPATCH_APP_PRIVATE_KEY }}
